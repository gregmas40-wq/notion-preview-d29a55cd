.header{

  background:rgba(255,255,255,.86);
  border:1px solid var(--border);

  padding:18px;

}
.h-left{display:flex; gap:12px; align-items:flex-start;}
.badge{

}

.btn.primary{

.side{
  background:rgba(255,255,255,.82);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:14px;
  backdrop-filter: blur(10px);
}
.side-title{margin:4px 0 10px 0;font-size:14px;color:var(--muted);font-weight:1000;}
.nav{display:flex;flex-direction:column;gap:8px;}
.nav button{
  text-align:left;width:100%;
  border:1px solid var(--border);
  background:var(--panel);
  border-radius:14px;
  padding:10px;
  cursor:pointer;
  font-weight:1000;
  display:flex;gap:10px;align-items:center;
}
.nav button .ico{width:22px;text-align:center;}
.nav button .hint{margin-left:auto;color:var(--muted);font-size:12px;font-weight:1000;}
.nav button.active{
  border-color: rgba(16,185,129,.55);
  box-shadow: 0 10px 22px rgba(16,185,129,.10);
  background: linear-gradient(180deg, rgba(16,185,129,.09), rgba(255,255,255,.9));
}

.panel{
  background:rgba(255,255,255,.88);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:16px 16px 20px 16px;
  backdrop-filter: blur(10px);
}
.section-title{display:flex;align-items:center;gap:10px;margin:0 0 10px 0;font-size:18px;}
.pill{
  font-size:12px;font-weight:1000;
  padding:6px 10px;border-radius:999px;
  border:1px solid rgba(16,185,129,.25);
  background:rgba(16,185,129,.10);
  color:#065f46;
}
.card{border:1px solid var(--border);border-radius:16px;background:var(--panel);padding:12px;}
.card h4{margin:0 0 6px 0;font-size:14px;}
.card p{margin:0;color:var(--muted);font-size:13px;line-height:1.55;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media (max-width: 900px){ .grid2{grid-template-columns:1fr;} }

.kv{
  display:flex;gap:10px;align-items:flex-start;
  padding:10px 12px;
  border:1px dashed rgba(16,185,129,.35);
  background: rgba(16,185,129,.06);
  border-radius:14px;
  margin:10px 0;
}
.kv .k-ico{width:22px;text-align:center;}
.kv .k-title{font-weight:1000;}
.kv .k-desc{color:var(--muted);font-weight:900;font-size:13px;line-height:1.5;}

.callout{
  border-radius:16px;
  padding:12px;
  border:1px solid var(--border);
  background: rgba(245,158,11,.10);
}
.callout strong{color:#7c2d12;}
.list{margin:8px 0 0 0; padding-left:18px; color:var(--muted); font-weight:900;}
.list li{margin:6px 0; line-height:1.55;}
.mini{font-size:12px;color:var(--muted);font-weight:1000;margin-top:6px;}
.hl{font-weight:1000;}
.hl.brand{color:#047857;}
.hl.warn{color:#b45309;}
.hl.danger{color:#b91c1c;}
hr.sep{border:0;border-top:1px solid var(--border);margin:14px 0;}
.actions{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
.actions .btn{flex:1;min-width:140px;}
</style>
